name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Find MakeAppx and set PATH
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" -Recurse -ErrorAction SilentlyContinue | Select -First 1
          if ($makeappx) {
            Write-Host "Found: $($makeappx.FullName)" -Foreground Green
            Add-Content $env:GITHUB_PATH (Split-Path $makeappx.FullName -Parent)
          } else {
            Write-Host "MakeAppx.exe NOT found" -Foreground Yellow
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Depth 1 -ErrorAction SilentlyContinue | Select FullName
          }

      - name: Build MSIX
        shell: pwsh
        run: |
          $hasMakeAppx = (Get-Command MakeAppx.exe -ErrorAction SilentlyContinue) -ne $null
          if ($hasMakeAppx) {
            $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=NA" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My"
            Add-Content $env:GITHUB_ENV "CERT_THUMB=$($cert.Thumbprint)"
            dotnet build src/NotAlterra.UI -c Release -p:PublishTrimmed=false -p:AppxPackageSigningEnabled=true -p:PackageCertificateThumbprint=$($cert.Thumbprint)
            # Save cert thumb for collect step
            Add-Content $env:GITHUB_ENV "HAS_MSIX=true"
          } else {
            Write-Host "No MakeAppx — publish unpackaged" -Foreground Yellow
            dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o publish/
            Add-Content $env:GITHUB_ENV "HAS_MSIX=false"
          }

      - name: Collect
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          if ($env:HAS_MSIX -eq "true") {
            $pkg = Get-ChildItem -Recurse -Filter *.msixupload -ErrorAction SilentlyContinue | Select -First 1
            if (-not $pkg) { $pkg = Get-ChildItem -Recurse -Filter *.msix -ErrorAction SilentlyContinue | Select -First 1 }
            if ($pkg) { Copy-Item $pkg.FullName publish/; Write-Host "BUILT: $($pkg.Name)" -Foreground Green; exit 0 }
            Write-Host "MSIX build ran but no package — fallback to zip" -Foreground Yellow
            dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o publish/
          }
          Compress-Archive -Path publish\* -DestinationPath NotAlterra-v0.5.0.zip -Force

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra v0.5.0

            MSIX installer — double-click to install.
          draft: true
