name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Generate signing cert
        shell: pwsh
        run: |
          $thumb = (New-SelfSignedCertificate -Type Custom -Subject "CN=NotAlterra CI" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My").Thumbprint
          Add-Content $env:GITHUB_ENV "CERT_THUMB=$thumb"

      - name: Build MSIX
        shell: pwsh
        run: dotnet build src/NotAlterra.UI -c Release -p:PublishTrimmed=false -p:AppxPackageSigningEnabled=true -p:PackageCertificateThumbprint=$env:CERT_THUMB

      - name: Collect MSIX
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          Write-Host "=== Searching for MSIX ==="
          Get-ChildItem -Recurse -Depth 5 src/NotAlterra.UI/bin/Release/ -ErrorAction SilentlyContinue | Select FullName, Length
          $f = Get-ChildItem -Recurse -Filter *.msixupload -ErrorAction SilentlyContinue | Select -First 1
          if (-not $f) { $f = Get-ChildItem -Recurse -Filter *.msix -ErrorAction SilentlyContinue | Select -First 1 }
          if ($f) { Copy-Item $f.FullName publish/; Write-Host "MSIX: $($f.Name)" }
          else {
            Get-ChildItem -Recurse -Depth 2 src/NotAlterra.UI/AppPackages/ src/NotAlterra.UI/bin/ -ErrorAction SilentlyContinue | Select FullName, Length
            throw "No MSIX found"
          }

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra v0.5.0

            MSIX installer — double-click to install.
          draft: true
