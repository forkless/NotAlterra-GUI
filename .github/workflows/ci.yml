name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Show SDK tools
        run: |
          where msbuild
          where makeappx
          where signtool

      - name: Generate cert
        shell: pwsh
        run: |
          $thumb = (New-SelfSignedCertificate -Type Custom -Subject "CN=NA" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My").Thumbprint
          Add-Content $env:GITHUB_ENV "CERT_THUMB=$thumb"

      - name: Build MSIX
        run: |
          msbuild src/NotAlterra.UI/NotAlterra.UI.csproj /restore `
            /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 `
            /p:WindowsPackageType=MSIX /p:GenerateAppxPackageOnBuild=true `
            /p:PublishTrimmed=false `
            /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=$env:CERT_THUMB

      - name: Collect
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $msix = Get-ChildItem -Recurse -Filter "*.msixupload" -ErrorAction SilentlyContinue | Select -First 1
          if (-not $msix) { $msix = Get-ChildItem -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue | Select -First 1 }
          if ($msix) {
            Copy-Item $msix.FullName publish/
            Write-Host "MSIX: $($msix.Name)" -Foreground Green
          }
          # Always provide zip as fallback
          dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o tmp/
          Compress-Archive -Path tmp\* -DestinationPath NotAlterra-v0.5.0.zip -Force

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra v0.5.0

            **MSIX installer (recommended):** `NotAlterra.UI_*.msix`
            Windows may show a greyed-out install button because the package is self-signed.
            Fix: right-click .msix → Properties → Digital Signatures → select cert → Details → Install Certificate → Local Machine → Trusted People. Then double-click to install.

            **ZIP fallback:** Extract and run `NotAlterra.UI.exe`.
            Requires .NET 9.0 + WinAppSDK 1.8 runtime.
            Windows may prompt about an unknown publisher — click "Run anyway".
          draft: true
