name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj
          dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          dotnet build src/NotAlterra.UI/NotAlterra.UI.csproj -c Debug --no-restore
          dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

      - name: 📋 MSIX diagnostics — Windows SDK tooling
        shell: pwsh
        run: |
          $log = "msix-diagnostics-logs.md"
          function diag($title) { "`n=== $title ===" | Out-File -Append $log; Write-Host $title -Foreground Cyan }
          function capture($cmd) { $out = cmd /c $cmd 2>&1; $out | Out-File -Append $log; $out | Out-Host }

          diag "DotNet info"
          capture "dotnet --info"

          diag "Windows SDK — MakeAppx.exe"
          capture "dir /s /b C:\'Program Files (x86)'\Windows*Kits\10\bin\*\x64\MakeAppx.exe 2>nul"
          capture "dir /s /b C:\'Program Files'\Microsoft*Visual*Studio\*\*\*\*\*\*\MakeAppx.exe 2>nul"

          diag "Windows SDK — SignTool.exe"
          capture "dir /s /b C:\'Program Files (x86)'\Windows*Kits\10\bin\*\x64\SignTool.exe 2>nul"

          diag "vcvars64.bat locations"
          capture "dir /s /b C:\'Program Files'\Microsoft*Visual*Studio\*\*\*\Auxiliary\Build\vcvars64.bat 2>nul"

          diag "VS installations"
          capture "dir /b C:\'Program Files'\Microsoft*Visual*Studio 2>nul"
          capture "dir /b C:\'Program Files (x86)'\Microsoft*Visual*Studio 2>nul"

          diag "Windows SDK registry"
          capture 'reg query "HKLM\SOFTWARE\Microsoft\Windows Kits\Installed Roots" /s 2>nul'

          diag "PATH (filtered SDK)"
          $env:Path -split ';' | Select-String -Pattern "kits|sdk|makeappx|signtool" | Out-String | Out-File -Append $log
          $env:Path -split ';' | Select-String -Pattern "kits|sdk|makeappx|signtool" | Out-Host

          diag "WinAppSDK NuGet package"
          capture "dir /s /b %USERPROFILE%\.nuget\packages\microsoft.windowsappsdk\1.8*\build"

          Write-Host "`n=== Log saved ===" -Foreground Green
          Write-Host "msix-diagnostics-logs.md saved to artifact"

      - name: 📋 MSIX diagnostics — diagnostic build attempt
        shell: pwsh
        run: |
          $log = "msix-diagnostics-logs.md"
          "`n=== Diagnostic MSIX build ===" | Out-File -Append $log
          Write-Host "=== Diagnostic MSIX build (will fail, capture output) ===" -Foreground Cyan

          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Diag" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My" -ErrorAction SilentlyContinue
          if ($cert) { $thumb = $cert.Thumbprint } else { $thumb = "" }

          "`n### Build command:" | Out-File -Append $log
          "dotnet build src/NotAlterra.UI -c Release -p:WindowsPackageType=MSIX -p:AppxPackageSigningEnabled=true -p:PackageCertificateThumbprint=$thumb -v d" | Out-File -Append $log

          "`n### Full build output:" | Out-File -Append $log
          dotnet build src/NotAlterra.UI -c Release -p:WindowsPackageType=MSIX -p:AppxPackageSigningEnabled=true -p:PackageCertificateThumbprint=$thumb -v d 2>&1 | Tee-Object -Append $log

          "`n### Filtered MSIX output:" | Out-File -Append $log
          Get-Content $log | Select-String -Pattern "MakeAppx|AppxPackage|msixupload|msixbundle|MSIX|AppPackages|WindowsPackageType|CreateAppx|GenerateAppx|error|error" | Tee-Object -Append $log

          "`n=== Post-build artifact search ===" | Out-File -Append $log
          Get-ChildItem -Recurse -Filter "*.msix*" -ErrorAction SilentlyContinue | Select FullName, Length | Out-File -Append $log
          Get-ChildItem -Recurse -Filter "*.appx*" -ErrorAction SilentlyContinue | Select FullName, Length | Out-File -Append $log
          Get-ChildItem -Recurse -Filter "*.build.appxrecipe" -ErrorAction SilentlyContinue | Select FullName, Length | Out-File -Append $log
          Get-ChildItem -Recurse -Filter "*.msix*" -ErrorAction SilentlyContinue | Select FullName, Length
          Get-ChildItem -Recurse -Filter "*.appx*" -ErrorAction SilentlyContinue | Select FullName, Length
          Get-ChildItem -Recurse -Filter "*.build.appxrecipe" -ErrorAction SilentlyContinue | Select FullName, Length

          if ($cert) { Get-ChildItem "Cert:\CurrentUser\My\$thumb" -ErrorAction SilentlyContinue | Remove-Item -ErrorAction SilentlyContinue }

          Write-Host "`n=== Full log saved to artifact ===" -Foreground Green

      - name: 📤 Upload MSIX diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: msix-diagnostics-${{ github.run_id }}
          path: |
            msix-diagnostics-logs.md
            src/NotAlterra.UI/AppPackages/
            src/NotAlterra.UI/bin/Release/**/*.msix*
            src/NotAlterra.UI/bin/Release/**/*.appx*
            src/NotAlterra.UI/bin/Release/**/*.build.appxrecipe
          if-no-files-found: warn
          retention-days: 7

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Signing cert
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=NotAlterra CI" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My"
          echo "CERT_THUMB=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package MSIX
        shell: pwsh
        run: |
          dotnet msbuild src/NotAlterra.UI/NotAlterra.UI.csproj /t:Publish `
            /p:Configuration=Release /p:RuntimeIdentifier=win-x64 `
            /p:AppxPackage=true /p:AppxBundle=Never `
            /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=$env:CERT_THUMB
          Write-Host "=== Looking for MSIX ==="
          Get-ChildItem -Recurse src/NotAlterra.UI/AppPackages/ -ErrorAction SilentlyContinue | Select FullName, Length

      - name: Collect
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $exts = @('.msix', '.msixupload', '.msixbundle')
          foreach ($ext in $exts) {
            $f = Get-ChildItem -Recurse -Filter "*$ext" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { Copy-Item $f.FullName publish/; Write-Host "PACKAGE: $($f.Name)"; break }
          }
          if (-not (Get-ChildItem publish/)) {
            Get-ChildItem -Recurse -Depth 3 publish/ -ErrorAction SilentlyContinue | Select FullName
            throw "No package produced"
          }

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra ${{ github.ref_name }}

            Windows MSIX installer — extract and run NotAlterra.UI.exe.
            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: true
