name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj
          dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          dotnet build src/NotAlterra.UI/NotAlterra.UI.csproj -c Debug --no-restore
          dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

      - name: 📋 MSIX diagnostics — Windows SDK tooling
        shell: pwsh
        run: |
          Write-Host "=== DotNet info ===" -Foreground Cyan
          dotnet --info 2>&1

          Write-Host "=== Windows SDK — MakeAppx.exe ===" -Foreground Cyan
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" -ErrorAction SilentlyContinue | Select FullName, Length, LastWriteTime
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\*\*\*\*\MakeAppx.exe" -ErrorAction SilentlyContinue | Select FullName

          Write-Host "=== Windows SDK — SignTool.exe ===" -Foreground Cyan
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\SignTool.exe" -ErrorAction SilentlyContinue | Select FullName

          Write-Host "=== vcvars64.bat locations ===" -Foreground Cyan
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\*\Auxiliary\Build\vcvars64.bat" -Recurse -ErrorAction SilentlyContinue | Select FullName

          Write-Host "=== Visual Studio installations ===" -Foreground Cyan
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*" -Directory -ErrorAction SilentlyContinue | Select Name
          Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio\*" -Directory -ErrorAction SilentlyContinue | Select Name

          Write-Host "=== Windows SDK registry ===" -Foreground Cyan
          Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots" -ErrorAction SilentlyContinue | Select-Object KitsRoot*, @{N="SDK Version";E={(Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Microsoft SDKs\Windows\v10.0").InstallationFolder}}

          Write-Host "=== PATH (filtered SDK) ===" -Foreground Cyan
          $env:Path -split ';' | Select-String -Pattern "kits|sdk|makeappx|signtool" | Out-Host

          Write-Host "=== MSBuild SDK resolver ===" -Foreground Cyan
          dir "$env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk\1.8*\build\Microsoft.WindowsAppSDK.targets" -ErrorAction SilentlyContinue | Select FullName, Length

      - name: 📋 MSIX diagnostics — diagnostic build attempt
        shell: pwsh
        run: |
          Write-Host "=== Diagnostic MSIX build (will fail, capture output) ===" -Foreground Cyan

          # Generate temp cert
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=Diag" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My" -ErrorAction SilentlyContinue
          if ($cert) { $thumb = $cert.Thumbprint } else { $thumb = "" }

          # Build with diagnostic verbosity, capture MSIX-related output
          dotnet build src/NotAlterra.UI -c Release -p:WindowsPackageType=MSIX -p:AppxPackageSigningEnabled=true -p:PackageCertificateThumbprint=$thumb -v d 2>&1 | Select-String -Pattern "MakeAppx|AppxPackage|msixupload|msixbundle|MSIX|AppPackages|WindowsPackageType|CreateAppx|GenerateAppx" -Context 1,2

          Write-Host "=== Post-build: search for any MSIX artifact ===" -Foreground Cyan
          Get-ChildItem -Recurse -Filter "*.msix*" -ErrorAction SilentlyContinue | Select FullName, Length
          Get-ChildItem -Recurse -Filter "*.appx*" -ErrorAction SilentlyContinue | Select FullName, Length
          Get-ChildItem -Recurse -Filter "*.build.appxrecipe" -ErrorAction SilentlyContinue | Select FullName, Length

          # Cleanup cert
          if ($cert) { Get-ChildItem "Cert:\CurrentUser\My\$thumb" -ErrorAction SilentlyContinue | Remove-Item -ErrorAction SilentlyContinue }

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Signing cert
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=NotAlterra CI" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My"
          echo "CERT_THUMB=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package MSIX
        shell: pwsh
        run: |
          dotnet msbuild src/NotAlterra.UI/NotAlterra.UI.csproj /t:Publish `
            /p:Configuration=Release /p:RuntimeIdentifier=win-x64 `
            /p:AppxPackage=true /p:AppxBundle=Never `
            /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=$env:CERT_THUMB
          Write-Host "=== Looking for MSIX ==="
          Get-ChildItem -Recurse src/NotAlterra.UI/AppPackages/ -ErrorAction SilentlyContinue | Select FullName, Length

      - name: Collect
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $exts = @('.msix', '.msixupload', '.msixbundle')
          foreach ($ext in $exts) {
            $f = Get-ChildItem -Recurse -Filter "*$ext" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($f) { Copy-Item $f.FullName publish/; Write-Host "PACKAGE: $($f.Name)"; break }
          }
          if (-not (Get-ChildItem publish/)) {
            Get-ChildItem -Recurse -Depth 3 publish/ -ErrorAction SilentlyContinue | Select FullName
            throw "No package produced"
          }

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra ${{ github.ref_name }}

            Windows MSIX installer — extract and run NotAlterra.UI.exe.
            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: true
