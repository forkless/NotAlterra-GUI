name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Show SDK tools
        run: |
          where msbuild
          where makeappx
          where signtool

      - name: Generate cert
        shell: pwsh
        run: |
          $thumb = (New-SelfSignedCertificate -Type Custom -Subject "CN=NA" -KeyUsage DigitalSignature -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") -CertStoreLocation "Cert:\CurrentUser\My").Thumbprint
          Add-Content $env:GITHUB_ENV "CERT_THUMB=$thumb"

      - name: Build MSIX
        run: |
          msbuild src/NotAlterra.UI/NotAlterra.UI.csproj /restore `
            /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 `
            /p:WindowsPackageType=MSIX /p:GenerateAppxPackageOnBuild=true `
            /p:PublishTrimmed=false `
            /p:AppxPackageSigningEnabled=true /p:PackageCertificateThumbprint=$env:CERT_THUMB

      - name: Collect
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          Write-Host "=== Looking for MSIX ==="
          Get-ChildItem -Recurse -Depth 1 src/NotAlterra.UI/AppPackages/ -ErrorAction SilentlyContinue | Select FullName, Length
          $pkg = Get-ChildItem -Recurse -Filter *.msixupload -ErrorAction SilentlyContinue | Select -First 1
          if (-not $pkg) { $pkg = Get-ChildItem -Recurse -Filter *.msix -ErrorAction SilentlyContinue | Select -First 1 }
          if ($pkg) { Copy-Item $pkg.FullName publish/; Write-Host "BUILT: $($pkg.Name)" -Foreground Green; exit 0 }
          Write-Host "No MSIX — zipping" -Foreground Yellow
          dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o publish/
          Compress-Archive -Path publish\* -DestinationPath NotAlterra-v0.5.0.zip -Force

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra v0.5.0

            MSIX installer — double-click to install.
          draft: true
