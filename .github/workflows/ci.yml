name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Pack (Inno Setup installers)
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $tag = "${{ github.ref_name }}"
          choco install innosetup -y --no-progress 2>&1 | Out-Null

          pip install Pillow -q 2>&1 | Out-Null
          python _gen_splash.py "$tag"

          # Minimal (~20MB, needs .NET 9 + WinAppSDK runtime)
          dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o tmp_min/
          iscc setup.iss /DMyAppVersion="$tag" /DSourceDir=tmp_min /F"NotAlterra-$tag-minimal" /O"publish"
          Remove-Item tmp_min\* -Recurse -Force -ErrorAction SilentlyContinue

          # Full (~90MB, self-contained)
          dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -r win-x64 --self-contained -p:WindowsAppSDKSelfContained=true -o tmp_full/
          iscc setup.iss /DMyAppVersion="$tag" /DSourceDir=tmp_full /F"NotAlterra-$tag-full" /O"publish"

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/*.exe
          body: |
            ## NotAlterra ${{ github.ref_name }}

            **Installer:** `NotAlterra-*-setup.exe` — standard Windows installer.
            Fully self-contained, no runtimes needed. Creates Start Menu shortcut.
            Self-signed: click "More info" → "Run anyway" if Windows Defender blocks.
          draft: true
