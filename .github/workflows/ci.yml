name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj
          dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build
        shell: pwsh
        run: |
          dotnet build src/NotAlterra.UI/NotAlterra.UI.csproj -c Debug --no-restore
          dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  fuzz:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SharpFuzz CLI
        run: dotnet tool install -g SharpFuzz.CommandLine

      - name: Run fuzz targets
        shell: pwsh
        run: |
          .\fuzz\fuzz.ps1 -Target gvas_parse -Runs 30000
          .\fuzz\fuzz.ps1 -Target gvas_full_meta -Runs 30000
          .\fuzz\fuzz.ps1 -Target tar_gz_integrity -Runs 30000
          .\fuzz\fuzz.ps1 -Target tar_gz_manifest -Runs 30000
        continue-on-error: true

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Generate signing cert
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom `
            -Subject "CN=NotAlterra CI" `
            -KeyUsage DigitalSignature `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $thumb = $cert.Thumbprint
          echo "CERT_THUMB=$thumb" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build MSIX
        shell: pwsh
        run: |
          dotnet publish src/NotAlterra.UI -c Release `
            -f net9.0-windows10.0.26100.0 `
            -p:WindowsPackageType=MSIX `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateThumbprint=$env:CERT_THUMB

      - name: Collect MSIX artifacts
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $pkg = Get-ChildItem -Recurse -Filter *.msixupload | Select-Object -First 1
          if (-not $pkg) { $pkg = Get-ChildItem -Recurse -Filter *.msixbundle | Select-Object -First 1 }
          if ($pkg) {
            Copy-Item $pkg.FullName publish/
            Write-Host "MSIX: $($pkg.Name) ($($pkg.Length) bytes)"
          } else {
            Write-Error "No MSIX package found"
          }
          Get-ChildItem publish/

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/**
          body: |
            ## NotAlterra ${{ github.ref_name }}

            Windows MSIX installer. See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: true