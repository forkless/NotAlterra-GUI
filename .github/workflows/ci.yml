name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI -c Debug --no-restore

      - name: Restore tests
        run: dotnet restore src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build tests
        run: dotnet build src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

      - name: Build for smoke test
        run: dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o tmp_smoke/

      - name: Smoke test — launch and verify 15s uptime
        shell: pwsh
        run: |
          $p = Start-Process -FilePath tmp_smoke/NotAlterra.UI.exe -PassThru -NoNewWindow
          Start-Sleep -Seconds 15
          if ($p.HasExited) { Write-Host "FAIL: App exited with code $($p.ExitCode)"; exit 1 } else { Write-Host "PASS: App alive at 15s (PID $($p.Id))"; Stop-Process $p }

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Pack (Inno Setup installer)
        shell: pwsh
        run: |
          mkdir -Force publish | Out-Null
          $tag = "${{ github.ref_name }}"
          choco install innosetup -y --no-progress 2>&1 | Out-Null

          pip install Pillow -q 2>&1 | Out-Null
          python scripts/_gen_splash.py "$tag"

          # Minimal (~19MB, needs .NET 9 runtime, installer prompts for WinAppSDK)
          dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o tmp_min/
          iscc scripts/setup.iss /DMyAppVersion="$tag" /DSourceDir=..\tmp_min /F"NotAlterra-$tag-Windows-x64" /O"${env:GITHUB_WORKSPACE}\publish"
          Copy-Item "${env:GITHUB_WORKSPACE}\publish\NotAlterra-$tag-Windows-x64.exe" "${env:GITHUB_WORKSPACE}\publish\NotAlterra-Windows-x64.exe"

      - name: Draft release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/NotAlterra-*.exe
          body: |
            ## NotAlterra ${{ github.ref_name }}

            Subnautica 2 save manager — unofficial, offline, no telemetry.

            **Installer:** `NotAlterra-Windows-x64.exe` (~19 MB)
            Auto-detects missing .NET 9 Desktop Runtime and Windows App SDK 1.8. UAC required.

            **Changes:** MSIX → Inno Setup, registry-based config, dynamic version in title bar.
          draft: false
