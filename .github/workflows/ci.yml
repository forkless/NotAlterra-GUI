name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/NotAlterra.UI/NotAlterra.UI.csproj src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj

      - name: Build
        run: dotnet build src/NotAlterra.UI/NotAlterra.UI.csproj src/NotAlterra.UI.Tests/NotAlterra.UI.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test src/NotAlterra.UI.Tests -c Debug --no-build --verbosity normal

  fuzz:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SharpFuzz CLI
        run: dotnet tool install -g SharpFuzz.CommandLine

      - name: Run fuzz targets
        shell: pwsh
        run: |
          .\fuzz\fuzz.ps1 -Target gvas_parse -Runs 30000
          .\fuzz\fuzz.ps1 -Target gvas_full_meta -Runs 30000
          .\fuzz\fuzz.ps1 -Target tar_gz_integrity -Runs 30000
          .\fuzz\fuzz.ps1 -Target tar_gz_manifest -Runs 30000
        continue-on-error: true

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build Release
        run: dotnet publish src/NotAlterra.UI -c Release -f net9.0-windows10.0.26100.0 -o publish/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/**
          body: |
            ## NotAlterra ${{ github.ref_name }}

            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: true
